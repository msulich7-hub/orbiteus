name: Secrets

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  detect-secrets:
    name: detect-secrets baseline scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install detect-secrets
        run: pip install "detect-secrets>=1.5"

      - name: Scan tracked content against baseline
        run: |
          set -e
          # Skip generated artifacts that contain inert metadata noise
          # (license JSON, coverage XML, Playwright traces).
          EXCLUDE='(^node_modules/|^backend/\.venv/|^\.next/|package-lock\.json|backend/migrations/versions/|^admin-ui/test-results/|^admin-ui/playwright-report/|^coverage\.xml$|^THIRD_PARTY_LICENSES\..*\.json$)'
          detect-secrets-hook --baseline .secrets.baseline \
            $(git ls-files | grep -Ev "$EXCLUDE") || {
              echo "::error::detect-secrets found new candidate secrets. Update .secrets.baseline if false-positive (detect-secrets scan --baseline .secrets.baseline)."
              exit 1
            }

      - name: Audit baseline freshness
        run: |
          # If the baseline is older than 90 days, surface a warning (does not fail).
          BASELINE_DATE=$(grep -o '"generated_at": "[^"]*"' .secrets.baseline | head -1 | cut -d'"' -f4 | cut -d'T' -f1)
          if [ -z "$BASELINE_DATE" ]; then
            echo "::warning::cannot parse baseline date"
            exit 0
          fi
          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$BASELINE_DATE" +%s) ) / 86400 ))
          if [ "$AGE_DAYS" -gt 90 ]; then
            echo "::warning::.secrets.baseline is ${AGE_DAYS} days old; refresh recommended"
          fi
