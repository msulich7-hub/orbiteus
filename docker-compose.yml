# Dev compose. One command: `docker compose up --build`.
#
# - Postgres image includes pgvector (docs/adr/0005).
# - Redis 7 alongside (cache, broker, pubsub backplane).
# - Backend runs uvicorn with reload (USE_GUNICORN=0).
# - Migrations run inline at backend start (RUN_MIGRATIONS=1).
# - Optional services live behind compose profiles:
#     `worker` (Celery workers — added in PR 5)
#     `monitor` (Prometheus + Grafana — added in PR 13)
#
# For production-grade single-host deployments use docker-compose.prod.yml.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: orbiteus
      POSTGRES_PASSWORD: orbiteus
      POSTGRES_DB: orbiteus
    ports:
      # Default 5432 (professional). Override locally if your host already
      # runs Postgres: `POSTGRES_HOST_PORT=5433 docker compose up`.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbiteus -d orbiteus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Default 6379 (professional). Override locally if your host already
      # runs Redis: `REDIS_HOST_PORT=6380 docker compose up`.
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://orbiteus:orbiteus@postgres:5432/orbiteus
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-development
      AI_SECRET_KEY: change-me-in-development
      ENVIRONMENT: development
      DEBUG: "true"
      RUN_MIGRATIONS: "1"
      USE_GUNICORN: "0"
      UVICORN_RELOAD: "1"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./admin-ui:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  postgres_data:
  redis_data:
