# VM intranet (10.10.99.60) — porty obok Testorbiteka (8010/3010) i Mercato.
# Uzycie: docker compose -p orbiteus -f docker-compose.yml -f docker-compose.vm-ports.yml up -d --build
services:
  backend:
    ports: !override
      - "8020:8000"
  frontend:
    ports: !override
      - "3020:3000"
  portal:
    ports: !override
      - "3021:3001"
  postgres:
    ports: !override
      - "5435:5432"
  redis:
    ports: !override
      - "6382:6379"
