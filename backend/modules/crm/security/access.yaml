record_rules:
  - name: crm_lead_own_only
    model: crm.lead
    roles: [crm.group_crm_user]
    domain: "[('assigned_user_id', '=', 'current_user')]"
    global: false

  - name: crm_prospect_own_only
    model: crm.prospect
    roles: [crm.group_crm_user]
    domain: "[('assigned_user_id', '=', 'current_user')]"
    global: false
