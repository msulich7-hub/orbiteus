# CRM module — access rights and record rules (canonical: Person/Lead/Stage/Team).
# Format: see orbiteus_core/security_loader.py.

access:
  # -------------------------------------------------------------------
  # CRM Manager — full access to all canonical CRM models.
  # -------------------------------------------------------------------
  - name: crm_manager_person
    role: crm.group_crm_manager
    model: crm.person
    read: true
    write: true
    create: true
    delete: true

  - name: crm_manager_lead
    role: crm.group_crm_manager
    model: crm.lead
    read: true
    write: true
    create: true
    delete: true

  - name: crm_manager_stage
    role: crm.group_crm_manager
    model: crm.stage
    read: true
    write: true
    create: true
    delete: true

  - name: crm_manager_team
    role: crm.group_crm_manager
    model: crm.team
    read: true
    write: true
    create: true
    delete: true

  # -------------------------------------------------------------------
  # CRM User (salesman) — create/edit Person + Lead, read-only Stage/Team.
  # -------------------------------------------------------------------
  - name: crm_user_person
    role: crm.group_crm_user
    model: crm.person
    read: true
    write: true
    create: true
    delete: false

  - name: crm_user_lead
    role: crm.group_crm_user
    model: crm.lead
    read: true
    write: true
    create: true
    delete: false

  - name: crm_user_stage
    role: crm.group_crm_user
    model: crm.stage
    read: true
    write: false
    create: false
    delete: false

  - name: crm_user_team
    role: crm.group_crm_user
    model: crm.team
    read: true
    write: false
    create: false
    delete: false

record_rules:
  # Salesman sees only leads assigned to them.
  - name: crm_lead_own_only
    model: crm.lead
    roles: [crm.group_crm_user]
    domain: "[('assigned_user_id', '=', 'current_user')]"
    global: false
