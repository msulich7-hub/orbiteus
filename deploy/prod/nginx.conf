# Production nginx vhost.
#
# Adjust `server_name` and certificate paths for your deployment. Place this
# file at /etc/nginx/sites-available/<host> on a bare-metal nginx, or mount it
# into the `nginx` service in docker-compose.prod.yml.
#
# SSE on /api/realtime/ requires `proxy_buffering off` and a long read timeout
# (see docs/11-realtime.md and ADR-0006).

upstream orbiteus_backend {
    server backend:8000;
    keepalive 32;
}

upstream orbiteus_frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # certbot --nginx -d app.example.com  manages these files; mount them
    # read-only into the nginx container under /etc/letsencrypt.
    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (docs/18-security.md). Tighten further per environment.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 25m;

    # Realtime: must NOT buffer. SSE clients see events immediately.
    location /api/realtime/ {
        proxy_pass http://orbiteus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        add_header X-Accel-Buffering no;
    }

    # API and OpenAPI docs.
    location /api/ {
        proxy_pass http://orbiteus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Internal Prometheus scrape — restrict by network policy or basic auth in prod.
    location = /metrics {
        proxy_pass http://orbiteus_backend/metrics;
        # allow 10.0.0.0/8;  # uncomment and add scraper subnet
        # allow 172.16.0.0/12;
        # deny all;
    }

    # Static Next.js assets — long cache, immutable.
    location /_next/static/ {
        proxy_pass http://orbiteus_frontend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        proxy_pass http://orbiteus_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
